<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Share your screen</title>
  <style>
    :root { color-scheme: dark; }
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
    html, body { height: 100%; }
    body {
      background: #0a0a0a;
      color: #f4f4f5;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    header {
      padding: 16px 20px 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }
    header h1 { font-size: 16px; font-weight: 600; }
    header p { font-size: 12.5px; color: rgba(244, 244, 245, 0.55); margin-top: 3px; }
    .list {
      flex: 1;
      overflow-y: auto;
      padding: 14px 20px;
    }
    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(244, 244, 245, 0.45);
      margin: 10px 0 8px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
    }
    .tile {
      background: rgba(255, 255, 255, 0.04);
      border: 2px solid transparent;
      border-radius: 10px;
      padding: 8px;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.1s ease, background 0.1s ease;
    }
    .tile:hover { background: rgba(255, 255, 255, 0.09); }
    .tile.selected { border-color: #8b5cf6; background: rgba(139, 92, 246, 0.12); }
    .tile img.thumb {
      width: 100%;
      height: 100px;
      object-fit: contain;
      border-radius: 6px;
      background: #000;
      display: block;
    }
    .tile .label {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 7px;
      min-width: 0;
    }
    .tile .label img.icon { width: 14px; height: 14px; flex-shrink: 0; }
    .tile .label span {
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding: 12px 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }
    footer button {
      appearance: none;
      border: none;
      cursor: pointer;
      padding: 9px 22px;
      font-size: 13.5px;
      font-weight: 600;
      border-radius: 9px;
      transition: opacity 0.12s ease;
    }
    #cancel { background: rgba(255, 255, 255, 0.1); color: #f4f4f5; }
    #cancel:hover { background: rgba(255, 255, 255, 0.16); }
    #share {
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      color: #fff;
    }
    #share:disabled { opacity: 0.35; cursor: default; }
  </style>
</head>
<body>
  <header>
    <h1>Share your screen</h1>
    <p>Choose what to share with the other participants in your call.</p>
  </header>
  <div class="list" id="list"></div>
  <footer>
    <button id="cancel">Cancel</button>
    <button id="share" disabled>Share</button>
  </footer>
  <script>
    let selectedId = null;
    const shareBtn = document.getElementById('share');

    function makeTile(source) {
      const tile = document.createElement('button');
      tile.className = 'tile';
      tile.type = 'button';
      const thumb = document.createElement('img');
      thumb.className = 'thumb';
      thumb.src = source.thumbnail;
      tile.appendChild(thumb);
      const label = document.createElement('div');
      label.className = 'label';
      if (source.appIcon) {
        const icon = document.createElement('img');
        icon.className = 'icon';
        icon.src = source.appIcon;
        label.appendChild(icon);
      }
      const name = document.createElement('span');
      name.textContent = source.name;
      name.title = source.name;
      label.appendChild(name);
      tile.appendChild(label);
      tile.addEventListener('click', () => {
        document.querySelectorAll('.tile').forEach((t) => t.classList.remove('selected'));
        tile.classList.add('selected');
        selectedId = source.id;
        shareBtn.disabled = false;
      });
      tile.addEventListener('dblclick', () => screenPicker.select(source.id));
      return tile;
    }

    screenPicker.onSources((sources) => {
      const list = document.getElementById('list');
      list.innerHTML = '';
      const screens = sources.filter((s) => s.isScreen);
      const windows = sources.filter((s) => !s.isScreen);
      if (screens.length) {
        const t = document.createElement('div');
        t.className = 'section-title';
        t.textContent = screens.length > 1 ? 'Screens' : 'Entire screen';
        list.appendChild(t);
        const grid = document.createElement('div');
        grid.className = 'grid';
        screens.forEach((s) => grid.appendChild(makeTile(s)));
        list.appendChild(grid);
      }
      if (windows.length) {
        const t = document.createElement('div');
        t.className = 'section-title';
        t.textContent = 'Application windows';
        list.appendChild(t);
        const grid = document.createElement('div');
        grid.className = 'grid';
        windows.forEach((s) => grid.appendChild(makeTile(s)));
        list.appendChild(grid);
      }
    });

    shareBtn.addEventListener('click', () => {
      if (selectedId) screenPicker.select(selectedId);
    });
    document.getElementById('cancel').addEventListener('click', () => screenPicker.cancel());
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') screenPicker.cancel();
    });
  </script>
</body>
</html>
