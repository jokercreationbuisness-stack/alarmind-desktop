<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alarmind — Offline</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at 50% 30%, #1a1a2e 0%, #0a0a0a 70%);
      color: #f4f4f5;
    }
    .wrap {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .badge {
      width: 88px;
      height: 88px;
      border-radius: 22px;
      background: linear-gradient(135deg, #6366F1 0%, #8B5CF6 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 44px;
      font-weight: 800;
      color: #fff;
      box-shadow: 0 12px 40px rgba(112, 0, 255, 0.35);
      margin-bottom: 26px;
      user-select: none;
    }
    h1 { font-size: 22px; margin: 0 0 10px; font-weight: 700; }
    p { font-size: 15px; line-height: 1.6; margin: 0 0 26px; color: rgba(244,244,245,0.7); max-width: 380px; }
    button {
      appearance: none;
      border: none;
      cursor: pointer;
      padding: 13px 30px;
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      border-radius: 12px;
      background: linear-gradient(135deg, #6366F1 0%, #8B5CF6 100%);
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }
    button:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(112,0,255,0.4); }
    button:active { transform: translateY(0); }
    .hint { margin-top: 18px; font-size: 12.5px; color: rgba(244,244,245,0.4); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="badge">A</div>
    <h1>You're offline</h1>
    <p>Alarmind needs an internet connection. Check your network and try again.</p>
    <button id="retry">Retry</button>
    <div class="hint">Alarmind Desktop</div>
  </div>
  <script>
    // No preload bridge is exposed, so reconnect by navigating directly to the
    // login page. If it loads, the app resumes; if not, the shell's did-fail-load
    // handler brings this screen back.
    document.getElementById('retry').addEventListener('click', function () {
      window.location.href = 'https://alarmind.in/login';
    });
  </script>
</body>
</html>
